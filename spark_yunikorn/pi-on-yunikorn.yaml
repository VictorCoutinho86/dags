apiVersion: "sparkoperator.k8s.io/v1beta2"
kind: SparkApplication
metadata:
  name: "spark-pi-{{ ds_nodash }}-{{ task_instance.try_number }}"
  namespace: spark-operator
spec:
  type: Python
  pythonVersion: "3"
  mode: cluster
  image: "public.ecr.aws/data-on-eks/spark:3.5.3-scala2.12-java17-python3-ubuntu"
  imagePullPolicy: Always
  mainApplicationFile: local:///opt/spark/examples/src/main/python/pi.py
  sparkVersion: "3.5.3"
  arguments:
    - "10000"
  sparkConf:
    "spark.app.name": "pyspark-pi-karpenter"
    "spark.driver.extraJavaOptions": "-Dlog4j.rootCategory=WARN,console"
    "spark.executor.extraJavaOptions": "-Dlog4j.rootCategory=WARN,console"
    "spark.dynamicAllocation.shuffleTracking.enabled": "true"
    "spark.kubernetes.scheduler.name": "yunikorn"
    "spark.kubernetes.driver.label.queue": "root.engineering"
    "spark.kubernetes.executor.label.queue": "root.engineering"
  restartPolicy:
    type: OnFailure
    onFailureRetries: 1
    onFailureRetryInterval: 10
    onSubmissionFailureRetries: 5
    onSubmissionFailureRetryInterval: 20

  driver:
    cores: 1
    memory: 2Gi
    labels:
      version: 
      app: spark
    serviceAccount: spark-sa
    nodeSelector:
      "karpenter.sh/capacity-type": "on-demand"
      "workload-type": "spark"
    tolerations:
      - key: "workload-type"
        operator: "Equal"
        value: "spark"
        effect: "NoSchedule"

  executor:
    cores: 3
    memory: 20Gi
    memoryOverhead: 4Gi
    serviceAccount: spark-sa
    labels:
      version: 3.5.3
      app: spark
    nodeSelector:
      "workload-type": "spark"
    tolerations:
      - key: "workload-type"
        operator: "Equal"
        value: "spark"
        effect: "NoSchedule"
    affinity:
      podAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                spark-role: driver
            topologyKey: topology.kubernetes.io/zone

  dynamicAllocation:
    enabled: true
    initialExecutors: 8
    maxExecutors: 12
    minExecutors: 4
