apiVersion: "sparkoperator.k8s.io/v1beta2"
kind: SparkApplication
metadata:
  name: "spark-pi-{{ ds_nodash }}-{{ task_instance.try_number }}"
  namespace: spark-operator
spec:
  type: Python
  pythonVersion: "3"
  mode: cluster
  image: docker.io/library/spark:4.0.1
  imagePullPolicy: IfNotPresent
  mainApplicationFile: local:///opt/spark/examples/src/main/python/pi.py
  sparkVersion: 4.0.1
  arguments:
    - "1000"
  sparkConf:
    "spark.app.name": "pyspark-pi-karpenter"
    "spark.driver.extraJavaOptions": "-Dlog4j.rootCategory=WARN,console"
    "spark.executor.extraJavaOptions": "-Dlog4j.rootCategory=WARN,console"
    "spark.dynamicAllocation.shuffleTracking.enabled": "true"
  restartPolicy:
    type: OnFailure
    onFailureRetries: 1
    onFailureRetryInterval: 10
    onSubmissionFailureRetries: 5
    onSubmissionFailureRetryInterval: 20

  driver:
    cores: 1
    memory: 1024m
    labels:
      version: 4.0.1
      app: spark

  executor:
    cores: 1
    memory: 512m
    labels:
      version: 4.0.1
      app: spark

  dynamicAllocation:
    enabled: true
    initialExecutors: 8
    maxExecutors: 12
    minExecutors: 4
